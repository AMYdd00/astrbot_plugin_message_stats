<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>发言统计面板</title><style>@media(prefers-color-scheme:dark){*{--bg:linear-gradient(135deg,#2a2d3e 0%,#253247 100%);--cb:rgba(255,255,255,0.08);--cb2:rgba(255,255,255,0.1);--cs:0 8px 32px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.1);--c:#E5E7EB;--c2:#9CA3AF;--c3:#6B7280;--l:rgba(255,255,255,0.06);--h:rgba(255,255,255,0.06);--n:#F3F4F6;--n2:#F87171;--p:#4ADE80}}*{--bg:linear-gradient(135deg,#E9EFF6 0%,#D6E4F0 100%);--cb:rgba(255,255,255,0.55);--cb2:rgba(255,255,255,0.6);--cs:0 8px 32px rgba(0,0,0,0.08),inset 0 1px 0 rgba(255,255,255,0.7);--c:#1F2937;--c2:#6B7280;--c3:#9CA3AF;--l:rgba(229,231,235,0.6);--h:rgba(255,255,255,0.35);--n:#1F2937;--n2:#EF4444;--p:#22C55E;margin:0;padding:0;box-sizing:border-box}BODY{font-family:'Microsoft YaHei','Segoe UI',sans-serif;background:var(--bg);color:var(--c);padding:40px;min-height:100vh}H1{font-size:28px;text-align:center;margin:0 0 40px}.c{background:var(--cb);backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%);border-radius:20px;padding:16px;margin:20px 0;box-shadow:var(--cs);border:1px solid var(--cb2);overflow:hidden}.c H2{font-size:20px;color:var(--c);margin:0 0 16px;padding:12px 16px 8px;border-bottom:2px solid var(--l)}ul{list-style:none;padding:4px 0}li{display:flex;align-items:center;padding:16px;border-bottom:1px solid var(--l);cursor:pointer;transition:all .3s ease}li:last-child{border-bottom:none}li:hover{background:var(--h);transform:translateX(5px);border-radius:16px}li .l{flex:1;min-width:0}li .A{font-size:18px;font-weight:600;color:var(--n)}li .B{font-size:13px;color:var(--c2);margin:4px 0 0}li .r{text-align:right;flex-shrink:0;margin:0 0 0 20px}li .u{font-size:20px;font-weight:700;color:var(--n2)}li .s{font-size:16px;font-weight:500;color:var(--p);margin:2px 0 0}.rc{padding:4px 0}.ri{display:flex;align-items:center;padding:16px;border-bottom:1px solid var(--l);transition:all .3s ease}.ri:last-child{border-bottom:none}.ri:hover{background:var(--h);transform:translateX(5px);border-radius:16px}.av{width:60px;height:60px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;margin:0 25px 0 0;box-shadow:0 4px 8px rgba(0,0,0,.2);text-shadow:0 1px 3px rgba(0,0,0,.3);overflow:hidden}.ri2{flex:1;min-width:0}.ri2 .nn{font-size:20px;font-weight:600;color:var(--n)}.ri2 .tt{font-size:12px;color:#7C3AED;font-weight:700;margin:0 0 0 6px;background:#EDE9FE;padding:0 6px;border-radius:6px;display:inline-block}.ri2 .dd{font-size:13px;color:var(--c2);margin:4px 0 0}.rs{text-align:right;flex-shrink:0;margin:0 0 0 20px}.rs .nn2{font-size:24px;font-weight:700;color:var(--n2)}.rs .pp{font-size:15px;color:var(--p);font-weight:500;margin:4px 0 0}.hi{text-align:center;padding:20px 16px;border-bottom:1px solid var(--l)}.hi .X{font-size:36px;font-weight:700;color:var(--n2)}.hi .y{font-size:14px;color:var(--c2);margin:6px 0 0}.hi .z{font-size:12px;color:var(--c3);margin:2px 0 0}.bk{display:inline-block;margin:12px 0;padding:8px 20px;background:rgba(59,130,246,0.15);color:#3B82F6;border:none;border-radius:20px;font-size:14px;outline:none}.bk:hover{background:rgba(59,130,246,0.25);transform:translateX(-3px);cursor:pointer}.delbtn{display:inline-block;margin:12px 12px;padding:8px 20px;background:rgba(239,68,68,0.12);color:#EF4444;border:none;border-radius:20px;font-size:14px;outline:none}.delbtn:hover{background:rgba(239,68,68,0.25);transform:translateX(3px);cursor:pointer}.ld{text-align:center;padding:80px 20px;color:var(--c3);font-size:16px}.em{text-align:center;padding:80px 20px;color:var(--c3)}.ht{border-radius:12px;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.25);padding:10px 16px;margin:12px 0;font-size:13px;color:#B45309}#md{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:999}#md_in{background:var(--cb);backdrop-filter:blur(16px);border-radius:16px;padding:30px;max-width:400px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.3);border:1px solid var(--cb2)}#md_msg{font-size:16px;font-weight:600;margin:0 0 20px;color:var(--n)}#md_btns{display:flex;gap:12px;justify-content:center}#md_btns button{padding:8px 24px;border:none;border-radius:12px;font-size:14px;cursor:pointer;outline:none}</style></head><body><h1>📊 发言统计面板</h1><div id="app"><div class="ld">加载中...</div></div><div id="md"><div id="md_in"><div id="md_msg">确认删除？</div><div id="md_btns"><button id="md_no" style="background:rgba(128,128,128,0.15);color:var(--c)">取消</button><button id="md_yes" style="background:#EF4444;color:#fff">确认删除</button></div></div></div><script type="module">const B=window.AstrBotPluginPage;if(!B){document.getElementById('app').innerHTML='<div class="ld">Bridge not available</div>'}else{await B.ready();const A=document.getElementById('app'),MD=document.getElementById('md'),MD_MSG=document.getElementById('md_msg'),MD_YES=document.getElementById('md_yes'),MD_NO=document.getElementById('md_no');let MD_CB=null;MD_YES.onclick=function(){MD.style.display='none';if(MD_CB)MD_CB()};MD_NO.onclick=function(){MD.style.display='none'};MD.onclick=function(e){if(e.target===MD)MD.style.display='none'};function F(r){return r&&r.data?r.data:r}const pal=['#F59E0B','#3B82F6','#8B5CF6','#EC4899','#10B981','#EF4444','#14B8A6','#F97316','#6366F1','#84CC16','#06B6D4','#D946EF','#0EA5E9','#EAB308','#A855F7'];function getColor(s){let h=0;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))>>>0}return pal[h%pal.length]}function makeAvatar(n){const c=n&&n.trim()?n.trim()[0]:'?';return'<div class="av" style="background:'+getColor(n||'x')+'">'+c+'</div>'}function isDefault(n){return n&&n.startsWith('群')&&!n.includes(' - ')}function showGroupList(){A.innerHTML='<div class="ld">加载中...</div>';B.apiGet('stats').then(r=>{const d=F(r),g=d&&d.groups?d.groups:null;if(g&&g.length){let h='<div class="c"><h2>选择群组</h2><ul>';g.forEach(x=>{const dn=x.display_name||x.group_name||'群'+x.group_id,no=isDefault(dn),un=x.user_count||0,tm=x.total_messages||0;h+='<li data-gid="'+x.group_id+'"><div class="l"><div class="A'+(no?'" style="color:#B45309"':'')+'">'+(no?'⚠️ ':'')+dn+'</div><div class="B">人数: '+un+' · 消息: '+tm+(x.file_size?' · '+x.file_size:'')+'</div></div><div class="r"><div class="u">'+un+' 人</div><div class="s">'+tm+' 条</div></div></li>'});h+='</ul></div><div class="ht">💡 群名称会在触发发言榜后更新</div>';A.innerHTML=h;A.querySelectorAll('li[data-gid]').forEach(el=>{el.onclick=function(){enterGroup(this.dataset.gid)}})}else{A.innerHTML='<div class="em">暂无群组数据</div>'}}).catch(e=>{A.innerHTML='<div class="em">暂无群组数据</div>'})}function enterGroup(id){A.innerHTML='<div class="ld">加载中...</div>';B.apiGet('stats',{group_id:id}).then(r=>{const d=F(r),g=d&&d.group?d.group:null;if(!g){A.innerHTML='<div class="em">暂无数据</div>';return}const u=g.top_users||[],dn=g.display_name||g.group_name||'群'+g.group_id,no=isDefault(dn);let h='';if(no)h+='<div class="ht">💡 群名称会在触发发言榜后更新</div>';h+='<div class="c"><div class="hi"><div class="X">'+g.total_messages+'</div><div class="y">'+(no?'⚠️ '+dn:dn)+'</div><div class="y">总发言数 · 共 '+g.user_count+' 人</div><div class="z">ID: '+g.group_id+(g.file_size?' · 数据: '+g.file_size:'')+'</div></div><div class="rc">'+u.map((x,i)=>{const t=x.title?'<span class="tt">「'+x.title+'」</span>':'';return'<div class="ri">'+makeAvatar(x.nickname)+'<div class="ri2"><div class="nn">'+x.nickname+t+'</div><div class="dd">最近发言: '+(x.last_date||'未知')+'</div></div><div class="rs"><div class="nn2">'+x.message_count+'</div><div class="pp">'+x.percentage.toFixed(1)+'%</div></div></div>'}).join('')+'</div></div>';const tb=document.createElement('div');tb.style.display='flex';tb.style.gap='12px';tb.style.alignItems='center';const bk=document.createElement('button');bk.className='bk';bk.textContent='← 返回';bk.onclick=showGroupList;tb.appendChild(bk);const db=document.createElement('button');db.className='delbtn';db.textContent='🗑️ 删除数据';db.onclick=function(){MD_MSG.textContent='确定要删除此群组的所有发言数据吗？此操作不可恢复！';MD_CB=function(){B.apiGet('delete',{group_id:id}).then(function(){showGroupList()}).catch(function(){showGroupList()})};MD.style.display='flex'};tb.appendChild(db);A.innerHTML=h;A.insertBefore(tb,A.firstChild)}).catch(e=>{A.innerHTML='<div class="em">加载失败</div>'})}window.enterGroup=enterGroup;window.showGroupList=showGroupList;showGroupList()}</script></body></html>
