<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>发言统计面板</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#333;padding:20px;min-height:100vh}h1{font-size:24px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}.group-list{list-style:none;padding:0}.group-list li{padding:12px 16px;background:#fff;border-radius:8px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:.2s}.group-list li:hover{background:#f0f4ff;transform:translateX(4px)}.group-list li .gname{font-weight:600;font-size:16px}.group-list li .gcount{color:#999;font-size:14px}.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}.card h2{font-size:18px;color:#333;margin-bottom:16px;display:flex;align-items:center;gap:8px}.card h2 .back{font-size:14px;color:#3B82F6;cursor:pointer;font-weight:400}.card h2 .back:hover{text-decoration:underline}.header-info{text-align:center;margin-bottom:20px}.header-info .total{font-size:14px;color:#666;margin-top:4px}.rank-item{display:flex;align-items:center;padding:12px 8px;border-bottom:1px solid #f0f0f0}.rank-item:last-child{border-bottom:none}.rank-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;margin-right:14px;flex-shrink:0}.rank-1{background:#F59E0B}.rank-2{background:#9CA3AF}.rank-3{background:#8B5CF6}.rank-other{background:#3B82F6}.rank-info{flex:1;min-width:0}.rank-info .name{font-size:16px;font-weight:600}.rank-info .title{font-size:12px;color:#7C3AED;font-weight:700;margin-left:6px;background:#EDE9FE;padding:0 6px;border-radius:6px;display:inline-block}.rank-info .count{font-size:13px;color:#999;margin-top:2px}.rank-stat{text-align:right;flex-shrink:0}.rank-stat .num{font-size:18px;font-weight:700;color:#EF4444}.rank-stat .pct{font-size:13px;color:#22C55E;font-weight:600}.empty{text-align:center;padding:60px 20px;color:#999}.btn-back{display:inline-block;margin-top:20px;padding:10px 24px;background:#3B82F6;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;transition:.2s}.btn-back:hover{background:#2563EB}.loading{text-align:center;padding:60px 20px;color:#999}</style></head><body><div id="app"><div class="loading">加载中...</div></div><script type="module">const bridge=window.AstrBotPluginPage;if(!bridge){document.getElementById('app').innerHTML='<div class="loading">Bridge not available</div>'}else{await bridge.ready();let groups=[];let selGroupId=null;const app=document.getElementById('app');async function loadGroups(){app.innerHTML='<div class="loading">加载中...</div>';try{const d=await bridge.apiGet('stats');if(d.groups&&Array.isArray(d.groups))groups=d.groups;else groups=[]}catch(e){groups=[]}renderList()}async function loadGroupRank(gid){app.innerHTML='<div class="loading">加载中...</div>';try{const d=await bridge.apiGet(`stats?group_id=${gid}`);renderRank(d)}catch(e){app.innerHTML='<div class="loading">加载失败</div>'}}function renderList(){if(!groups.length){app.innerHTML='<div class="empty">暂无群组数据</div>';return}let h='<h1>📊 发言统计面板</h1><div class="card"><h2>选择群组</h2><ul class="group-list">';for(const g of groups){const name=g.group_name||'群'+g.group_id;const count=g.total_messages||0;h+=`<li onclick="selG('${g.group_id}')"><span class="gname">${name}</span><span class="gcount">${count} 条</span></li>`}h+='</ul></div>';app.innerHTML=h;window.selG=function(gid){selGroupId=gid;loadGroupRank(gid)}}function renderRank(d){const g=d.group;if(!g){app.innerHTML='<div class="empty">暂无数据 <br><br><button class="btn-back" onclick="backList()">返回群组列表</button></div>';window.backList=()=>renderList();return}const users=g.top_users||[];const name=g.group_name||'群'+g.group_id;let h='<h1><span class="back" onclick="backList()">← 返回</span> 📊 '+name+'</h1><div class="card">';h+=`<div class="header-info"><div style="font-size:28px;font-weight:700;color:#3B82F6">${g.total_messages}</div><div class="total">总发言数 · 共 ${g.user_count} 人</div></div>`;for(let i=0;i<users.length;i++){const u=users[i];const cls=i<3?`rank-${i+1}`:'rank-other';const titleTag=u.title?`<span class="title">「${u.title}」</span>`:'';h+=`<div class="rank-item"><div class="rank-num ${cls}">${i+1}</div><div class="rank-info"><div class="name">${u.nickname}${titleTag}</div><div class="count">最近发言: ${u.last_date||'未知'}</div></div><div class="rank-stat"><div class="num">${u.message_count}</div><div class="pct">${u.percentage.toFixed(1)}%</div></div></div>`}h+='</div>';window.backList=()=>renderList();app.innerHTML=h}loadGroups()}</script></body></html>
