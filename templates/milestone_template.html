<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline' https:;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发言里程碑</title>
    <style>
        {% raw %}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #a2e8d7;
            padding: 60px 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .poster {
            width: 480px;
            position: relative;
        }

        .brand-header {
            background-color: #ff2244;
            color: white;
            font-size: 23px;
            font-weight: 900;
            padding: 6px 14px;
            border-radius: 25px;
            display: inline-block;
            margin-bottom: 25px;
            margin-left: 10px;
            line-height: 1.1;
        }

        /* ====== 文件夹底座控制 ====== */
        .card-stage {
            position: relative;
            width: 480px;
            height: 560px;
            filter: drop-shadow(0 15px 35px rgba(0, 0, 0, 0.08));
        }

        .svg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 内容层 */
        .content-layer {
            position: relative;
            z-index: 5;
            padding: 90px 25px 0 25px;
        }

        .medal-box {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .medal-solid {
            width: 160px;
            height: 160px;
            background-color: #ffe48b;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 18px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ava-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #fff;
        }

        .nick-txt {
            font-size: 34px;
            font-weight: 800;
            color: #111;
            padding-top: 20px;
        }

        .text-body {
            text-align: left;
        }

        .eng-hint {
            font-size: 21px;
            color: #94a3b8;
            margin-bottom: 0px;
            font-weight: 700;
            line-height: 0.9;
        }

        /* 统一行间距控制 */
        .main-row {
            display: flex;
            align-items: baseline;
            white-space: nowrap;
            margin-bottom: 8px; /* 设置统一的下边距 */
            margin-top: -15px;
        }

        .label-txt {
            font-size: 38px;
            font-weight: 900;
            color: #000;
        }

        .num-red {
            font-size: 98px;
            font-weight: 900;
            color: #ff2244;
            margin-left: 6px;
            line-height: 1;
            letter-spacing: -3px;
        }

        .info-row {
            font-size: 28px;
            font-weight: 800;
            color: #111;
            margin-bottom: 8px; /* 设置与 main-row 相同的下边距，最后一行除外 */
            line-height: 1.2;
            letter-spacing: -0.5px;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            font-size: 15px;
            font-weight: 800;
            color: #111;
        }
        {% endraw %}
    </style>
</head>

<body>
    <div class="poster">
        <div class="brand-header">群聊成就</div>

        <div class="card-stage">
            <svg class="svg-canvas" viewBox="0 0 480 560">
                <path d="M 0,70 
                         A 35,35 0 0 1 35,35 
                         H 180 
                         C 210,35 230,70 260,70 
                         H 445 
                         A 35,35 0 0 1 480,105 
                         V 525 
                         A 35,35 0 0 1 445,560 
                         H 35 
                         A 35,35 0 0 1 0,525 
                         Z" fill="white" />
                <polygon points="25,35 85,35 130,150 70,150" fill="#ffcbd1" />
                <polygon points="185,35 125,35 80,150 140,150" fill="#ffcbd1" />
            </svg>

            <div class="content-layer">
                <div class="medal-box">
                    <div class="medal-solid">
                        <img class="ava-img" src="{{ avatar_url }}" alt="avatar" />
                    </div>
                    <div class="nick-txt">{{ nickname }}</div>
                </div>

                <div class="text-body">
                    <div class="eng-hint">Total number<br>of messages</div>
                    <div class="main-row">
                        <span class="label-txt">总发言破</span>
                        <span class="num-red">{{ milestone_count }}</span>
                    </div>
                    
                    <div class="info-row">
                        群内排名 <span style="color: #ff2244;">#{{ rank }}</span>
                    </div>
                    <div class="info-row">
                        { 击败了群内 <span style="color: #ff2244;">{{ percentage }}%</span> 的活跃群友 }
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <span>&lt; {{ group_name }} &gt;</span>
            <span>milestone card :)</span>
        </div>
    </div>
</body>

</html>
